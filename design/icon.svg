<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5CFF"/>
      <stop offset="55%" stop-color="#5E5ADC"/>
      <stop offset="100%" stop-color="#3B4FD8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Top highlight for glass feel -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#glass)"/>

  <!-- Soft accent orb behind the cursor -->
  <circle cx="640" cy="420" r="260" fill="url(#ring)"/>

  <!-- Cursor dot + tracking ring (concentric, centered) -->
  <circle cx="640" cy="420" r="26" fill="#ffffff"/>
  <circle cx="640" cy="420" r="84" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="8"/>
  <circle cx="640" cy="420" r="148" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>

  <!-- Abstract pinching hand: two rounded strokes meeting at the cursor -->
  <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" fill="none">
    <path d="M 220 820 Q 340 640 500 520"/>
    <path d="M 420 900 Q 500 720 600 560"/>
  </g>

  <!-- Thumb tip dot -->
  <circle cx="512" cy="510" r="22" fill="#ffffff"/>
</svg>
